<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루선녀 - 운명의 기록</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; overflow-x: hidden; background: #000; font-family: 'Pretendard', sans-serif; }
        .video-container { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        /* 스크롤 부드럽게 */
        body { scroll-snap-type: y mandatory; }

        /* 정보 기입창 스타일 (소용돌이 위치) */
        .form-overlay {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            display: none; 
            flex-direction: column;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        input, select {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .btn-submit {
            padding: 16px;
            background: linear-gradient(135deg, #ffd700, #ffae00);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="vid1" muted playsinline>
            <source src="intro_01.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-container">
        <video id="vid2" muted playsinline>
            <source src="intro_02.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-container">
        <video id="vid3" loop muted playsinline>
            <source src="intro_03.mp4" type="video/mp4">
        </video>
        
        <div class="form-overlay" id="infoForm">
            <input type="text" placeholder="이름" id="uName">
            <input type="tel" placeholder="전화번호" id="uPhone">
            <select id="uGender">
                <option value="">성별 선택</option>
                <option value="male">남성</option>
                <option value="female">여성</option>
            </select>
            <input type="date" id="uBirth">
            <button class="btn-submit" onclick="startFortune()">운명의 기록 확인하기</button>
        </div>
    </div>

    <script>
        const videos = document.querySelectorAll('video');
        const form = document.getElementById('infoForm');

        const options = { threshold: 0.7 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target;
                if (entry.isIntersecting) {
                    vid.currentTime = 0;
                    vid.play();
                    // 장면 3 포털 위치에서 폼 등장
                    if(vid.id === 'vid3') {
                        setTimeout(() => { form.style.display = 'flex'; }, 800);
                    }
                } else {
                    vid.pause();
                    if(vid.id === 'vid3') form.style.display = 'none';
                }
            });
        }, options);

        videos.forEach(v => observer.observe(v));

        function startFortune() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            if(!name || !phone) { 
                alert("성함과 전화번호를 입력하셔야 기록을 읽을 수 있습니다."); 
                return; 
            }
            alert(name + "님, 이제 당신의 사주 결과 1막 1컷으로 들어갑니다.");
        }
    </script>
</body>
</html>
