<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루선녀</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .v-container { position: relative; width: 100%; height: 100vh; overflow: hidden; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        body { scroll-snap-type: y mandatory; }

        .input-box {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 380px; background: rgba(0,0,0,0.95); /* 배경 더 진하게 */
            padding: 20px; border-radius: 20px; border: 1px solid #ffd700;
            display: none; flex-direction: column; gap: 10px; z-index: 999;
        }

        /* ⭐ 선택창(Select) 배경 블랙 강제 고정 */
        input, select { 
            padding: 14px; border-radius: 10px; border: 1px solid #444; 
            background-color: #1a1a1a !important; /* 진한 회색/검정 */
            color: #ffffff !important;           /* 무조건 흰색 글자 */
            font-size: 16px; 
            -webkit-appearance: none;           /* 아이폰 기본 스타일 제거 */
            -moz-appearance: none;
            appearance: none;
            outline: none;
        }

        /* 화살표가 안 보일 수 있어서 배경 이미지로 화살표 추가 (옵션) */
        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 12px auto;
        }

        /* 리스트 항목 배경 강제 블랙 */
        select option {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        .gender-row { display: flex; gap: 10px; }
        .gender-btn { 
            flex: 1; text-align: center; cursor: pointer; font-weight: bold; color: #aaa; 
            padding: 14px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a;
        }
        .gender-btn.active { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.15); }
        
        .submit-btn { 
            background: linear-gradient(45deg, #ffd700, #ff8c00); 
            color: #000; font-weight: bold; border: none; padding: 16px; border-radius: 12px; font-size: 18px; margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="v-container"><video id="v1" muted playsinline><source src="intro_01.mp4" type="video/mp4"></video></div>
    <div class="v-container"><video id="v2" muted playsinline><source src="intro_02.mp4" type="video/mp4"></video></div>
    <div class="v-container">
        <video id="v3" loop muted playsinline><source src="intro_03.mp4" type="video/mp4"></video>
        <div class="input-box" id="f">
            <input type="text" id="n" placeholder="성함" style="background-color: #1a1a1a !important; color: #fff !important;">
            <div class="gender-row">
                <div class="gender-btn" id="mBtn" onclick="sel('남', this)">남성</div>
                <div class="gender-btn" id="fBtn" onclick="sel('여', this)">여성</div>
            </div>
            <div style="display:flex; gap:5px;">
                <select id="yy"></select><select id="mm"></select><select id="dd"></select>
            </div>
            <select id="tm">
                <option value="모름">태어난 시간 (모름)</option>
                <option value="자시">자시 (23~01시)</option>
                <option value="축시">축시 (01~03시)</option>
                <option value="인시">인시 (03~05시)</option>
                <option value="묘시">묘시 (05~07시)</option>
                <option value="진시">진시 (07~09시)</option>
                <option value="사시">사시 (09~11시)</option>
                <option value="오시">오시 (11~13시)</option>
                <option value="미시">미시 (13~15시)</option>
                <option value="신시">신시 (15~17시)</option>
                <option value="유시">유시 (17~19시)</option>
                <option value="술시">술시 (19~21시)</option>
                <option value="해시">해시 (21~23시)</option>
            </select>
            <button class="submit-btn" onclick="go()">기록 확인하기</button>
        </div>
    </div>

    <script>
        const y=document.getElementById('yy'), m=document.getElementById('mm'), d=document.getElementById('dd');
        for(let i=2026;i>=1950;i--) y.innerHTML+=`<option value="${i}">${i}년</option>`;
        for(let i=1;i<=12;i++) m.innerHTML+=`<option value="${i}">${i}월</option>`;
        for(let i=1;i<=31;i++) d.innerHTML+=`<option value="${i}">${i}일</option>`;

        let g = "";
        function sel(v, btn){
            g = v;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target.querySelector('video');
                if(e.isIntersecting) {
                    v.play();
                    if(v.id === 'v3') setTimeout(() => { document.getElementById('f').style.display = 'flex'; }, 800);
                } else {
                    v.pause();
                    if(v.id === 'v3') document.getElementById('f').style.display = 'none';
                }
            });
        }, {threshold: 0.6});
        document.querySelectorAll('.v-container').forEach(c => obs.observe(c));

        function go(){
            const n = document.getElementById('n').value;
            if(!n || !g) return alert("성함과 성별을 확인해주세요.");
            alert(n + "님, 사주 기록을 해독합니다.");
        }
    </script>
</body>
</html>
