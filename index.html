<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루테크 - 제1막</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100vh; /* 폰 화면 높이에 꽉 맞춤 */
            background: url('https://raw.githubusercontent.com/voleant24-dotcom/haru-tech/main/bg001.jpg.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 여신님 사이즈 수정 핵심 */
        .character {
            position: absolute;
            bottom: 25%; /* 대사창 위쪽 적당한 위치 */
            height: 60vh; /* 화면 높이의 60%만 차지하게 고정 (이게 중요!) */
            width: auto;  /* 가로 세로 비율 유지 */
            z-index: 2;
            animation: float 3.5s ease-in-out infinite;
            /* 흰색 배경 문제는 나중에 누끼 따면 해결되니 일단 유지 */
            mix-blend-mode: multiply; 
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 대사창: 폰 화면 하단에 가독성 있게 배치 */
        .dialogue-box {
            position: absolute;
            bottom: 5vh;
            width: 90%;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            color: white;
            z-index: 3;
            box-sizing: border-box;
            text-align: center;
        }

        .name { color: #ffd700; font-weight: bold; font-size: 1rem; margin-bottom: 8px; }
        .text { font-size: 0.85rem; line-height: 1.5; word-break: keep-all; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="scene">
    <img src="https://raw.githubusercontent.com/voleant24-dotcom/haru-tech/main/c001.png.png" class="character">

    <div class="dialogue-box">
        <div class="name">여신 (Goddess)</div>
        <div class="text">
            "오시느라 고생 많으셨습니다. 이 먼 곳, 시공간의 틈새까지 당신의 발소리가 닿기만을... 저는 아주 오래전부터 기다리고 있었답니다."
        </div>
    </div>
</div>

</body>
</html>
