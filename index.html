<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루테크 - 제1막</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }

        /* 배경 설정: 회장님 깃허브의 bg001.jpg.png 연결 */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://raw.githubusercontent.com/voleant24-dotcom/haru-tech/main/bg001.jpg.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* 캐릭터 설정: 회장님 깃허브의 c001.png.png 연결 */
        .character {
            position: absolute;
            bottom: 15%;
            width: 100%; /* 전신이 잘 보이도록 조절 */
            z-index: 2;
            animation: float 3s ease-in-out infinite;
            /* 흰색 배경을 투명하게 처리 */
            mix-blend-mode: multiply;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 말풍선 디자인 */
        .dialogue-box {
            position: relative;
            width: 85%;
            bottom: 50px;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 20px;
            color: white;
            z-index: 3;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            font-family: sans-serif;
        }

        .name { color: #ffd700; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; }
        .text { line-height: 1.6; font-size: 1rem; word-break: keep-all; }
    </style>
</head>
<body>

<div class="scene">
    <img src="https://raw.githubusercontent.com/voleant24-dotcom/haru-tech/main/c001.png.png" class="character">

    <div class="dialogue-box">
        <div class="name">여신 (Goddess)</div>
        <div class="text">
            "오시느라 고생 많으셨습니다. 이 먼 곳, 시공간의 틈새까지 당신의 발소리가 닿기만을... 저는 아주 오래전부터 기다리고 있었답니다."
        </div>
    </div>
</div>

</body>
</html>
