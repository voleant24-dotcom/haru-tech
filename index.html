<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루선녀 - 운명의 기록</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; overflow-x: hidden; background: #000; font-family: 'Pretendard', sans-serif; color: #fff; }
        .video-container { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        body { scroll-snap-type: y mandatory; }

        /* 입력창 컨테이너 - 위치를 하단으로 조정 (말풍선 피함) */
        .form-overlay {
            position: absolute;
            bottom: 8%; /* 아래쪽으로 배치 */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: none; 
            flex-direction: column;
            gap: 12px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        /* 이름 & 번호 입력 */
        .input-group input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 15px; box-sizing: border-box;
        }

        /* 성별 버튼식 선택 */
        .gender-group { display: flex; gap: 10px; }
        .gender-btn {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444;
            background: rgba(255, 255, 255, 0.1); color: #888; cursor: pointer; text-align: center;
        }
        .gender-btn.active { border-color: #ffd700; color: #ffd700; background: rgba(255, 215, 0, 0.1); }

        /* 생년월일시 드롭다운 그룹 */
        .select-row { display: flex; gap: 5px; }
        select {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444;
            background: #1a1a1a; color: #fff; font-size: 13px;
        }

        .btn-submit {
            padding: 15px; background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none; border-radius: 10px; font-weight: bold; color: #000; font-size: 16px; margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="video-container"><video id="vid1" muted playsinline><source src="intro_01.mp4.mp4" type="video/mp4"></video></div>
    <div class="video-container"><video id="vid2" muted playsinline><source src="intro_02.mp4.mp4" type="video/mp4"></video></div>
    <div class="video-container">
        <video id="vid3" loop muted playsinline><source src="intro_03.mp4.mp4" type="video/mp4"></video>
        <div class="form-overlay" id="infoForm">
            <div class="input-group">
                <input type="text" id="uName" placeholder="이름을 입력하세요">
            </div>
            <div class="input-group">
                <input type="tel" id="uPhone" placeholder="전화번호 (010-0000-0000)">
            </div>
            <div class="gender-group">
                <div class="gender-btn" onclick="selectGender('남', this)">남성</div>
                <div class="gender-btn" onclick="selectGender('여', this)">여성</div>
            </div>
            <div class="select-row">
                <select id="birthYear"></select>
                <select id="birthMonth"></select>
                <select id="birthDay"></select>
            </div>
            <select id="birthTime">
                <option value="모름">태어난 시간 (모름)</option>
                <option value="자시">자시 (23~01시)</option><option value="축시">축시 (01~03시)</option>
                <option value="인시">인시 (03~05시)</option><option value="묘시">묘시 (05~07시)</option>
                <option value="진시">진시 (07~09시)</option><option value="사시">사시 (09~11시)</option>
                <option value="오시">오시 (11~13시)</option><option value="미시">미시 (13~15시)</option>
                <option value="신시">신시 (15~17시)</option><option value="유시">유시 (17~19시)</option>
                <option value="술시">술시 (19~21시)</option><option value="해시">해시 (21~23시)</option>
            </select>
            <button class="btn-submit" onclick="startFortune()">기록 확인하기</button>
        </div>
    </div>

    <script>
        // 년/월/일 옵션 생성
        const ySelect = document.getElementById('birthYear');
        const mSelect = document.getElementById('birthMonth');
        const dSelect = document.getElementById('birthDay');
        
        for(let y=2024; y>=1950; y--) ySelect.innerHTML += `<option value="${y}">${y}년</option>`;
        for(let m=1; m<=12; m++) mSelect.innerHTML += `<option value="${m}">${m}월</option>`;
        for(let d=1; d<=31; d++) dSelect.innerHTML += `<option value="${d}">${d}일</option>`;

        let selectedGender = "";
        function selectGender(g, btn) {
            selectedGender = g;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const videos = document.querySelectorAll('video');
        const form = document.getElementById('infoForm');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play();
                    if(entry.target.id === 'vid3') setTimeout(() => { form.style.display = 'flex'; }, 800);
                } else {
                    entry.target.pause();
                    if(entry.target.id === 'vid3') form.style.display = 'none';
                }
            });
        }, { threshold: 0.6 });
        videos.forEach(v => observer.observe(v));

        function startFortune() {
            const name = document.getElementById('uName').value;
            if(!name || !selectedGender) { alert("이름과 성별을 확인해주세요."); return; }
            alert(name + "님, 사주 풀이로 이동합니다.");
        }
    </script>
</body>
</html>
