<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루선녀</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .v-container { position: relative; width: 100%; height: 100vh; overflow: hidden; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        body { scroll-snap-type: y mandatory; }

        .input-box {
            position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: rgba(0,0,0,0.92);
            padding: 15px 15px; border-radius: 20px; border: 1px solid #ffd700;
            display: none; flex-direction: column; gap: 8px; z-index: 999;
            box-sizing: border-box;
        }

        input, select { 
            width: 100%; padding: 13px; border-radius: 10px; border: 1px solid #444; 
            background-color: #1a1a1a !important; color: #ffffff !important; 
            font-size: 15px; box-sizing: border-box; outline: none;
            -webkit-appearance: none; appearance: none;
        }

        .select-row { display: flex; gap: 8px; width: 100%; }
        .select-row select { 
            flex: 1; padding-right: 20px;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 8px auto;
        }

        .gender-row { display: flex; gap: 10px; }
        .gender-btn { 
            flex: 1; text-align: center; cursor: pointer; font-weight: bold; color: #aaa; 
            padding: 13px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; font-size: 15px;
        }
        .gender-btn.active { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.15); }
        
        .submit-btn { 
            background: linear-gradient(45deg, #ffd700, #ff8c00); 
            color: #000; font-weight: bold; border: none; padding: 15px; border-radius: 12px; font-size: 17px; margin-top: 2px;
        }

        .info-text { color: #eee; font-size: 11px; text-align: center; line-height: 1.3; margin-top: 2px; letter-spacing: -0.5px; }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: none;
        }
        #loadingOverlay video { width: 100%; height: 100%; object-fit: cover; }

        /* --- 여기서부터 사주 섹션 스타일 추가 --- */
        #sajuSection { display: none; }
        
        /* 말풍선 공통 스타일 (위치 확인용 빨간박스) */
        .bubble { 
            position: absolute; z-index: 1000; font-weight: 700; color: #fff; 
            text-align: center; word-break: keep-all; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 0, 0, 0.5); border: 2px solid red; 
        }

        /* 컷별 개별 좌표 (회장님이 영상 보면서 숫자 수정) */
        /* 컷별 개별 좌표 (영상 속 말풍선 위치에 맞게 수정 완료) */
        .pos-001 { top: 70%; left: 50%; transform: translate(-50%, -50%); width: 62%; height: 100px; }
        .pos-002 { top: 73%; left: 50%; transform: translate(-50%, -50%); width: 62%; height: 100px; }
        .pos-003 { top: 22%; left: 83%; transform: translate(-50%, -50%); width: 28%; height: 130px; }
        .pos-004 { top: 60%; left: 35%; transform: translate(-50%, -50%); width: 65%; height: 110px; }
        .pos-005 { top: 81%; left: 48%; transform: translate(-50%, -50%); width: 60%; height: 110px; }
        .pos-006 { top: 40%; left: 70%; transform: translate(-50%, -50%); width: 32%; height: 160px; }
        .pos-007 { top: 60%; left: 50%; transform: translate(-50%, -50%); width: 44%; height: 105px; }
        .pos-008 { top: 18%; left: 70%; transform: translate(-50%, -50%); width: 48%; height: 95px; }
        .pos-009 { top: 55%; left: 30%; transform: translate(-50%, -50%); width: 50%; height: 100px; }
        .pos-010 { top: 21%; left: 31%; transform: translate(-50%, -50%); width: 33%; height: 140px; }
    </style>
</head>
<body>

    <div class="v-container"><video id="v1" muted playsinline><source src="intro_01.mp4" type="video/mp4"></video></div>
    <div class="v-container"><video id="v2" muted playsinline><source src="intro_02.mp4" type="video/mp4"></video></div>
    <div class="v-container">
        <video id="v3" loop muted playsinline><source src="intro_03.mp4" type="video/mp4"></video>
        <div class="input-box" id="f">
            <input type="text" id="uName" placeholder="성함">
            <div class="gender-row">
                <div class="gender-btn" onclick="sel('남', this)">남성</div>
                <div class="gender-btn" onclick="sel('여', this)">여성</div>
            </div>
            <div class="select-row">
                <select id="yy"></select><select id="mm"></select><select id="dd"></select>
            </div>
            <select id="tm">
                <option value="모름">태어난 시간 (모름)</option>
                <option value="자시">자시 (23~01시)</option><option value="축시">축시 (01~03시)</option>
                <option value="인시">인시 (03~05시)</option><option value="묘시">묘시 (05~07시)</option>
                <option value="진시">진시 (07~09시)</option><option value="사시">사시 (09~11시)</option>
                <option value="오시">오시 (11~13시)</option><option value="미시">미시 (13~15시)</option>
                <option value="신시">신시 (15~17시)</option><option value="유시">유시 (17~19시)</option>
                <option value="술시">술시 (19~21시)</option><option value="해시">해시 (21~23시)</option>
            </select>
            <input type="tel" id="uPhone" placeholder="전화번호 (운세 수신용)">
            <button class="submit-btn" onclick="go()">기록 확인하기</button>
            <div class="info-text">매일매일 카톡으로 당일의 웹툰 운세를 보내드립니다.</div>
        </div>
    </div>

    <div id="loadingOverlay"><video id="loadVideo" muted playsinline><source src="loading.mp4" type="video/mp4"></video></div>

    <div id="sajuSection">
        <div class="v-container"><video muted playsinline><source src="saju001.mp4" type="video/mp4"></video><div class="bubble pos-001" id="t1"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju002.mp4" type="video/mp4"></video><div class="bubble pos-002" id="t2"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju003.mp4" type="video/mp4"></video><div class="bubble pos-003" id="t3"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju004.mp4" type="video/mp4"></video><div class="bubble pos-004" id="t4"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju005.mp4" type="video/mp4"></video><div class="bubble pos-005" id="t5"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju006.mp4" type="video/mp4"></video><div class="bubble pos-006" id="t6"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju007.mp4" type="video/mp4"></video><div class="bubble pos-007" id="t7"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju008.mp4" type="video/mp4"></video><div class="bubble pos-008" id="t8"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju009.mp4" type="video/mp4"></video><div class="bubble pos-009" id="t9"></div></div>
        <div class="v-container"><video muted playsinline><source src="saju010.mp4" type="video/mp4"></video><div class="bubble pos-010" id="t10"></div></div>
    </div>

    <script>
        const y=document.getElementById('yy'), m=document.getElementById('mm'), d=document.getElementById('dd');
        for(let i=2026;i>=1950;i--) y.innerHTML+=`<option value="${i}">${i}년</option>`;
        for(let i=1;i<=12;i++) m.innerHTML+=`<option value="${i}">${i}월</option>`;
        for(let i=1;i<=31;i++) d.innerHTML+=`<option value="${i}">${i}일</option>`;

        let g = "";
        function sel(v, btn){
            g = v;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target.querySelector('video');
                if(e.isIntersecting) {
                    v.play();
                    if(v.id === 'v3') setTimeout(() => { document.getElementById('f').style.display = 'flex'; }, 800);
                } else {
                    v.pause();
                    if(v.id === 'v3') document.getElementById('f').style.display = 'none';
                }
            });
        }, {threshold: 0.6});
        document.querySelectorAll('.v-container').forEach(c => obs.observe(c));

        function go(){
            const n = document.getElementById('uName').value;
            const p = document.getElementById('uPhone').value;
            const pNum = p.replace(/[^0-9]/g, "");

            if(!n || !g || !p) { alert("빈칸을 모두 채워주세요."); return; }
            if(pNum.length < 10) { alert("전화번호를 정확히 입력해주세요."); return; }

            const overlay = document.getElementById('loadingOverlay');
            const loadVid = document.getElementById('loadVideo');
            overlay.style.display = 'block';
            loadVid.play();

            loadVid.onended = function() {
                overlay.style.display = 'none';
                const section = document.getElementById('sajuSection');
                section.style.display = 'block';

                // 테스트용 텍스트 주입
                for(let i=1; i<=10; i++){
                    const t = document.getElementById('t'+i);
                    if(t) t.innerText = i + "번 말풍선 좌표 테스트";
                }

                section.querySelectorAll('.v-container').forEach(c => obs.observe(c));
                section.querySelector('.v-container').scrollIntoView({ behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
