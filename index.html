<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루선녀</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        body { scroll-snap-type: y mandatory; overflow-y: scroll; }
        .v-container { position: relative; width: 100%; height: 100vh; overflow: hidden; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 입력창 */
        .input-box {
            position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: rgba(0,0,0,0.92);
            padding: 15px; border-radius: 20px; border: 1px solid #ffd700;
            display: none; flex-direction: column; gap: 8px; z-index: 999;
        }
        input, select { width: 100%; padding: 13px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 15px; outline: none; }
        .gender-row { display: flex; gap: 10px; }
        .gender-btn { flex: 1; text-align: center; cursor: pointer; padding: 13px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; }
        .gender-btn.active { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.15); }
        .submit-btn { background: linear-gradient(45deg, #ffd700, #ff8c00); color: #000; font-weight: bold; border: none; padding: 15px; border-radius: 12px; font-size: 17px; cursor: pointer; }

        /* 로딩 레이어 */
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; }
        
        /* 사주 섹션 (초기 숨김) */
        #sajuSection { display: none; }

        /* 말풍선 공통 스타일 */
        .bubble {
            position: absolute; z-index: 1000; font-weight: 700; color: #2c2c2c;
            text-align: center; word-break: keep-all; display: flex; align-items: center; justify-content: center;
        }

        /* 컷별 좌표 설정 (재촬영 영상에 맞춰 수정 필요) */
        .pos-001 { top: 78%; left: 50%; transform: translate(-50%, -50%); width: 65%; }
        .pos-002 { top: 78%; left: 50%; transform: translate(-50%, -50%); width: 65%; }
        .pos-003 { top: 20%; left: 75%; transform: translate(-50%, -50%); width: 25%; }
        /* 004 ~ 010 까지 동일한 방식으로 추가 */
    </style>
</head>
<body>

    <div class="v-container"><video id="v1" muted playsinline><source src="intro_01.mp4" type="video/mp4"></video></div>
    <div class="v-container"><video id="v2" muted playsinline><source src="intro_02.mp4" type="video/mp4"></video></div>
    <div class="v-container">
        <video id="v3" loop muted playsinline><source src="intro_03.mp4" type="video/mp4"></video>
        <div class="input-box" id="f">
            <input type="text" id="uName" placeholder="성함">
            <div class="gender-row">
                <div class="gender-btn" onclick="sel('남', this)">남성</div>
                <div class="gender-btn" onclick="sel('여', this)">여성</div>
            </div>
            <div style="display:flex; gap:8px; margin-top:8px;">
                <select id="yy"></select><select id="mm"></select><select id="dd"></select>
            </div>
            <button class="submit-btn" onclick="go()">기록 확인하기</button>
        </div>
    </div>

    <div id="loadingOverlay">
        <video id="loadVideo" muted playsinline><source src="loading.mp4" type="video/mp4"></video>
    </div>

    <div id="sajuSection">
        <div class="v-container">
            <video muted playsinline><source src="saju001.mp4" type="video/mp4"></video>
            <div class="bubble pos-001" id="t1"></div>
        </div>
        <div class="v-container">
            <video muted playsinline><source src="saju002.mp4" type="video/mp4"></video>
            <div class="bubble pos-002" id="t2"></div>
        </div>
        <div class="v-container">
            <video muted playsinline><source src="saju003.mp4" type="video/mp4"></video>
            <div class="bubble pos-003" id="t3"></div>
        </div>
        </div>

    <script>
        const y=document.getElementById('yy'), m=document.getElementById('mm'), d=document.getElementById('dd');
        for(let i=2026;i>=1950;i--) if(y) y.innerHTML+=`<option value="${i}">${i}년</option>`;
        for(let i=1;i<=12;i++) if(m) m.innerHTML+=`<option value="${i}">${i}월</option>`;
        for(let i=1;i<=31;i++) if(d) d.innerHTML+=`<option value="${i}">${i}일</option>`;

        let g = "";
        function sel(v, btn){ g = v; document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target.querySelector('video');
                if(e.isIntersecting) { 
                    v.play(); 
                    if(v.id === 'v3') document.getElementById('f').style.display = 'flex'; 
                } else { 
                    v.pause(); 
                    if(v.id === 'v3') document.getElementById('f').style.display = 'none'; 
                }
            });
        }, {threshold: 0.6});

        document.querySelectorAll('.v-container').forEach(c => obs.observe(c));

        function go() {
            const n = document.getElementById('uName').value;
            if(!n || !g) return;
            const overlay = document.getElementById('loadingOverlay');
            const loadVid = document.getElementById('loadVideo');
            overlay.style.display = 'block';
            loadVid.play();
            
            loadVid.onended = () => {
                overlay.style.display = 'none';
                const section = document.getElementById('sajuSection');
                section.style.display = 'block';
                
                // 텍스트 주입
                document.getElementById('t1').innerText = n + "님, 사주 풀이를 시작합니다.";
                document.getElementById('t2').innerText = "영상의 기운이 느껴지시나요?";
                document.getElementById('t3').innerText = "여기서부터는 스크롤로 확인하세요.";

                section.querySelectorAll('.v-container').forEach(c => obs.observe(c));
                section.querySelector('.v-container').scrollIntoView({ behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
