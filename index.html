<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루선녀 테스트</title>
    <style>
        body { margin: 0; background: #000; color: #fff; text-align: center; }
        video { width: 100%; height: 100vh; object-fit: cover; display: none; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .input-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; }
        #sajuText { 
            position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%); 
            width: 80%; z-index: 10001; font-size: 1.2rem; font-weight: bold;
            text-shadow: 2px 2px 4px #000; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="startUI" class="input-ui">
        <input type="text" id="uName" placeholder="이름 입력">
        <button onclick="go()">운세 시작하기</button>
    </div>

    <div id="loadingOverlay" style="display:none;">
        <h2 style="margin-top:45vh;">신령님께 가는 중...</h2>
    </div>

    <video id="mainVid" playsinline muted></video>
    <div id="sajuText" style="display:none;"></div>

    <script>
        const video = document.getElementById('mainVid');
        const textDiv = document.getElementById('sajuText');

        function go() {
            const name = document.getElementById('uName').value;
            if(!name) { alert("이름을 써주세요"); return; }
            
            document.getElementById('startUI').style.display = 'none';
            document.getElementById('loadingOverlay').style.display = 'block';

            // 2초 뒤에 바로 영상 재생
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                video.style.display = 'block';
                textDiv.style.display = 'block';
                playCut(1, name);
            }, 2000);
        }

        function playCut(num, name) {
            const fileNum = String(num).padStart(3, '0');
            video.src = `saju${fileNum}.mp4`;
            
            // 대사 처리
            if(num == 1) textDiv.innerText = name + "님, 환영해요!";
            else textDiv.innerText = num + "번째 운명을 읽고 있어요.";

            video.load(); // 영상 새로고침
            video.play().catch(e => {
                console.log("재생 오류:", e);
                alert("영상을 찾을 수 없거나 재생할 수 없습니다: saju" + fileNum + ".mp4");
            });

            video.onended = () => {
                if(num < 10) playCut(num + 1, name);
                else alert("10컷 종료!");
            };
        }
    </script>
</body>
</html>
