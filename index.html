<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루선녀</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; font-family: sans-serif; }
        .v-container { position: relative; width: 100%; height: 100vh; overflow: hidden; scroll-snap-align: start; }
        video { width: 100%; height: 100%; object-fit: cover; }
        body { scroll-snap-type: y mandatory; overflow-x: hidden; }

        /* 입력창 위치 - 화면 하단 10% 지점 */
        .input-box {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 15px; border: 1px solid #ffd700;
            display: none; flex-direction: column; gap: 10px; z-index: 999;
        }
        input, select, .gender-btn { 
            padding: 12px; border-radius: 8px; border: 1px solid #444; 
            background: #222; color: #fff; font-size: 16px; 
        }
        .gender-row { display: flex; gap: 10px; }
        .gender-btn { flex: 1; text-align: center; cursor: pointer; border: 1px solid #444; }
        .gender-btn.on { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.1); }
        .submit-btn { 
            background: linear-gradient(to right, #ffd700, #ff8c00); 
            color: #000; font-weight: bold; border: none; cursor: pointer; padding: 15px; border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="v-container"><video id="v1" muted playsinline><source src="intro_01.mp4.mp4" type="video/mp4"></video></div>
    <div class="v-container"><video id="v2" muted playsinline><source src="intro_02.mp4.mp4" type="video/mp4"></video></div>
    <div class="v-container">
        <video id="v3" loop muted playsinline><source src="intro_03.mp4.mp4" type="video/mp4"></video>
        <div class="input-box" id="f">
            <input type="text" id="n" placeholder="이름">
            <input type="tel" id="p" placeholder="전화번호">
            <div class="gender-row">
                <div class="gender-btn" id="mBtn" onclick="sel('남')">남성</div>
                <div class="gender-btn" id="fBtn" onclick="sel('여')">여성</div>
            </div>
            <div style="display:flex; gap:5px;">
                <select id="yy"></select><select id="mm"></select><select id="dd"></select>
            </div>
            <select id="tm">
                <option value="모름">태어난 시간 (모름)</option>
                <option value="묘시">묘시 (05~07시)</option>
                <option value="진시">진시 (07~09시)</option>
                </select>
            <button class="submit-btn" onclick="go()">기록 확인하기</button>
        </div>
    </div>

    <script>
        // 날짜 채우기
        const y=document.getElementById('yy'), m=document.getElementById('mm'), d=document.getElementById('dd');
        for(let i=2025;i>=1950;i--) y.innerHTML+=`<option>${i}년</option>`;
        for(let i=1;i<=12;i++) m.innerHTML+=`<option>${i}월</option>`;
        for(let i=1;i<=31;i++) d.innerHTML+=`<option>${i}일</option>`;

        let g = "";
        function sel(v){
            g = v;
            document.getElementById('mBtn').classList.toggle('on', v==='남');
            document.getElementById('fBtn').classList.toggle('on', v==='여');
        }

        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target.querySelector('video');
                if(e.isIntersecting) {
                    v.play();
                    if(v.id === 'v3') document.getElementById('f').style.display = 'flex';
                } else {
                    v.pause();
                    if(v.id === 'v3') document.getElementById('f').style.display = 'none';
                }
            });
        }, {threshold: 0.5});
        document.querySelectorAll('.v-container').forEach(c => obs.observe(c));

        function go(){
            const n = document.getElementById('n').value;
            if(!n || !g) return alert("이름과 성별을 확인해주세요.");
            alert(n + "님, 사주를 풀이합니다.");
        }
    </script>
</body>
</html>
